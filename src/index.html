<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section class="columns">
        <div class="todo">
            <h2>TODO</h2>
            <p class="card-text">
                Welcome to Trello!
            </p>

                + Add another card
            </button>
            <div id="cardContainer"></div>
        </div>
        <div class="progress">
            <h2>IN PROGRESS</h2>

                Welcome to Trello!
            </p>
            <p class="card-text">This is a card.</p>
            <button id="addCard">
                + Add another card
            </button>
            <div id="cardContainer"></div>
        </div>
        <div class="done">
            <h2>DONE</h2>
            <p class="card-text">
                Welcome to Trello!
            </p>
            <p class="card-text">This is a card.</p>
            <button id="addCard">
                + Add another card
            </button>
            <div id="cardContainer"></div>
        </div>
    </section>
</body>

</html>
